name: Build and Publish Dev Package

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'The branch to checkout code from'
        required: true
        default: 'dev'
  pull_request:
    types: ['closed']
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.branch }}
  cancel-in-progress: true

env:
  target_branch: ${{ github.event.inputs.branch || github.event.pull_request.merge_commit_sha }}
  branch_name: ${{ github.event.inputs.branch || github.event.pull_request.head.ref || 'dev' }}

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.target_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Read original version and create dev version
        id: version_processing
        env:
          BRANCH_NAME: ${{ env.branch_name }}
        run: |
          # 读取原始版本
          ORIGINAL_VERSION=$(cat version.txt | tr -d '\n' | tr -d '\r')
          echo "Original version: $ORIGINAL_VERSION"
          
          # 生成符合 PEP 440 规范的 dev 版本
          # 格式: <version>.dev<timestamp>+<branch>.<commit>
          BRANCH="$BRANCH_NAME"
          BRANCH=$(echo "$BRANCH" | sed 's/\//-/g' | sed 's/[^a-zA-Z0-9.-]/-/g')
          COMMIT=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          
          DEV_VERSION="${ORIGINAL_VERSION}.dev${TIMESTAMP}+${BRANCH}.${COMMIT}"
          
          # 输出环境变量供后续步骤使用
          echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_ENV
          echo "Branch: $BRANCH"
          echo "Commit: $COMMIT"
          echo "Publishing dev version: $DEV_VERSION"
          
          # 写入临时的 version.txt
          printf '%s' "$DEV_VERSION" > version.txt

      - name: Install dependencies
        run: |
          npm install

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel twine

      - name: Build Python package
        run: |
          npm run build:py

      - name: Verify package version
        run: |
          # 验证打包的版本是否正确
          PACKAGE_NAME=$(ls dist/*.whl | head -n1)
          echo "Built package: $PACKAGE_NAME"
          echo "Expected version: $DEV_VERSION"
          
          # 简单验证：检查包名中是否包含时间戳和 commit
          # 提取时间戳（dev 后面的数字）和 commit（最后的小写字母数字组合）
          TIMESTAMP=$(echo "$DEV_VERSION" | sed -n 's/.*\.dev\([0-9]\+\).*/\1/p')
          COMMIT=$(echo "$DEV_VERSION" | sed -n 's/.*\.\([a-f0-9]\+\)$/\1/p')
          
          if [[ -z "$TIMESTAMP" ]] || [[ -z "$COMMIT" ]]; then
            echo "Warning: Could not extract timestamp or commit from version"
          else
            if [[ "$PACKAGE_NAME" != *"$TIMESTAMP"* ]] || [[ "$PACKAGE_NAME" != *"$COMMIT"* ]]; then
              echo "Error: Package version doesn't contain expected timestamp or commit"
              echo "Expected timestamp: $TIMESTAMP"
              echo "Expected commit: $COMMIT"
              exit 1
            fi
            echo "Version verification passed!"
          fi

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_KEY }}
        run: |
          python -m twine upload dist/*.whl

